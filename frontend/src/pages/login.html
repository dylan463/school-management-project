<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mention Télécommunication | ESPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .login-bg {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
    </style>
</head>
<body>

    <!-- ====================== PAGE LOGIN ====================== -->
    <div id="login-page" class="min-h-screen login-bg flex items-center justify-center">
        <div class="max-w-md w-full mx-4">
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                
                <!-- En-tête -->
                <div class="px-10 pt-10 pb-6 text-center">
                    <div class="flex justify-center mb-6">
                        <img src="images/logo-espa.png" alt="Logo ESPA Télécommunication" class="w-20 h-20 rounded-3xl shadow-inner">
                    </div>
                    <h1 class="text-3xl font-semibold text-slate-900 logo-font">Télécommunication</h1>
                    <p class="text-slate-600 mt-2">École Supérieure Polytechnique d’Antananarivo</p>
                </div>

                <!-- Formulaire de connexion -->
                <div class="px-10 pb-10">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Matricule </label>
                            <div class="relative">
                                <input 
                                    id="username"
                                    type="text" 
                                    placeholder="Votre matricule"
                                    class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-[#1e40af] text-sm"
                                    value="">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Mot de passe</label>
                            <div class="relative">
                                <input 
                                    id="password"
                                    type="password" 
                                    placeholder="••••••••"
                                    class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-[#1e40af] text-sm"
                                    value="123456">
                                <button onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                    <i id="eye-icon" class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 accent-[#1e40af]" checked>
                                <span class="text-slate-600">Se souvenir de moi</span>
                            </label>
                            <a href="#" onclick="forgotPassword()" class="text-[#1e40af] hover:underline">Mot de passe oublié ?</a>
                        </div>

                        <!-- Bouton Connexion -->
                        <button 
                            onclick="login()"
                            class="w-full bg-[#1e40af] hover:bg-[#1e3a8a] text-white font-semibold py-4 rounded-2xl text-lg shadow-lg shadow-blue-500/30">
                            Se connecter
                        </button>

                        <div class="text-center text-xs text-slate-500 mt-4">
                            Version 1.0 • Mention Télécommunication ESPA
                        </div>
                    </div>
                </div>

                <!-- Pied de page login -->
                <div class="border-t border-slate-100 bg-slate-50 px-10 py-6 text-center text-xs text-slate-500">
                    © 2026 École Supérieure Polytechnique d’Antananarivo
                </div>
            </div>
        </div>
    </div>

    <!-- ====================== APPLICATION PRINCIPALE (cachée au départ) ====================== -->
    <div id="main-app" class="hidden flex h-screen">
        
        <!-- SIDEBAR (identique à la version précédente) -->
        <div class="w-72 bg-white border-r border-slate-200 h-screen overflow-y-auto sidebar flex-shrink-0">
            <!-- Même sidebar que précédemment -->
            <div class="p-6">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-[#1e40af] rounded-2xl flex items-center justify-center text-white text-2xl">📡</div>
                    <div class="font-semibold text-lg">Télécom ESPA</div>
                </div>
                
                <nav class="space-y-1">
                    <ul id="sidebar-menu" class="space-y-1">
                        <!-- Les éléments seront générés par JS -->
                    </ul>
                </nav>
            </div>
        </div>

        <!-- CONTENU PRINCIPAL -->
        <div class="flex-1 flex flex-col">
            <!-- Topbar -->
            <header class="bg-white border-b h-16 flex items-center px-8 justify-between">
                <div class="flex items-center gap-4">
                    <h1 id="page-title" class="text-2xl font-semibold text-slate-800">Tableau de bord</h1>
                </div>
                
                <div class="flex items-center gap-6">
                    <div onclick="toggleNotifications()" class="relative cursor-pointer">
                        <i class="fa-solid fa-bell text-2xl text-slate-700"></i>
                        <span id="notif-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] h-5 w-5 flex items-center justify-center rounded-full">3</span>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p id="user-name" class="font-medium text-sm">Prof. Rakotoarisoa</p>
                            <p class="text-xs text-emerald-600">Connecté</p>
                        </div>
                        <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    
                    <button onclick="logout()" class="text-red-600 hover:text-red-700 text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Déconnexion
                    </button>
                </div>
            </header>

            <!-- Contenu des pages -->
            <main class="flex-1 overflow-auto p-8" id="main-content">
                <!-- Le contenu des pages sera chargé ici via JavaScript -->
                <div id="dashboard-content">
                    <!-- Même contenu du tableau de bord que dans la version précédente -->
                    <h2 class="text-4xl font-semibold">Bonjour, <span id="welcome-name"></span> 👋</h2>
                    <!-- ... (tu peux copier-coller le reste du dashboard ici si tu veux) -->
                </div>
            </main>
        </div>
    </div>

    <script>
        // ==================== UTILISATEURS DE TEST ====================
        const users = {
            "admin@espa.mg": {
                password: "123456",
                role: "Administrateur",
                name: "Prof. Rakotoarisoa Jean",
                type: "enseignant"
            },
            "TC202301@espa.mg": {
                password: "123456",
                role: "Étudiant",
                name: "Andrianarisoa Hery",
                type: "etudiant"
            }
        }

        let currentUser = null;

        // ==================== FONCTIONS LOGIN ====================
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eye = document.getElementById('eye-icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = "password";
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function forgotPassword() {
            alert("🔑 Fonction de récupération de mot de passe en cours de développement.\nContactez l'administrateur système.");
        }

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert("Veuillez remplir tous les champs !");
                return;
            }

            const user = users[username];

            if (user && user.password === password) {
                currentUser = { ...user, username };
                
                // Cacher la page login et afficher l'application
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Initialiser l'application
                initMainApp();
            } else {
                alert("❌ Matricule/Email ou mot de passe incorrect !\n\nEssayez :\nadmin@espa.mg / 123456");
            }
        }

        function logout() {
            if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
                currentUser = null;
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('password').value = "";
            }
        }

        // ==================== INITIALISATION DE L'APPLICATION APRÈS LOGIN ====================
        function initMainApp() {
            // Afficher le nom de l'utilisateur
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('welcome-name').textContent = currentUser.name.split(' ')[0];

            // Afficher un message de bienvenue selon le rôle
            if (currentUser.role === "Administrateur") {
                document.getElementById('page-title').textContent = "Tableau de bord Administrateur";
            } else {
                document.getElementById('page-title').textContent = "Tableau de bord Étudiant";
            }

            // Ici tu peux charger le contenu du dashboard complet (celui de la version précédente)
            console.log(`✅ Connexion réussie en tant que ${currentUser.role} : ${currentUser.name}`);
            
            // Tu peux appeler ici toutes les fonctions de rendu (renderEtudiants, createCharts, etc.)
            // Pour l'instant, on affiche juste un message
            alert(`Bienvenue ${currentUser.name} !\n\nVous êtes connecté en tant que ${currentUser.role}`);
        }

        // ==================== NOTIFICATIONS (exemple) ====================
        function toggleNotifications() {
            alert("🛎️ Notifications :\n• Nouvelle note disponible\n• Cours 5G dans 30 minutes");
        }

        // ==================== LANCEMENT ====================
        window.onload = function() {
            // Option : Pré-remplir pour faciliter les tests
            // document.getElementById('username').value = "admin@espa.mg";
            // document.getElementById('password').value = "123456";
            
            console.log("%cPage de login prête - Mention Télécommunication ESPA", "color:#1e40af; font-weight:bold");
        }
    </script>
</body>
</html>
